<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PeshoX Intelligence | Horizon</title>
    <!-- Global core -->
    <link rel="stylesheet" href="galaxy-core.css">
    <link rel="stylesheet" href="horizon.css">
    <script src="galaxy-core.js" defer></script>
    <script src="horizon.js" defer></script>
</head>
<body>
    <div class="main-content horizon-container">
        <div class="hero-glow"></div>
        <div class="hero-content">
            <h1 class="main-title">PESHOX INTELLIGENCE</h1>
            <p class="subtitle english-text">Aviator Detection System</p>
            <p class="subtitle urdu-text">ایوی ایٹر ڈیٹیکشن سسٹم</p>
            <div class="button-group">
                <button id="getAccessBtn" class="btn-primary">
                    <i class="fas fa-key"></i> GET YOUR ACCESS / رسائی حاصل کریں
                </button>
                <button id="loginBtn" class="btn-secondary">
                    <i class="fas fa-sign-in-alt"></i> LOGIN WITH ID KEY / آئی ڈی کی کے ساتھ لاگ ان کریں
                </button>
            </div>
        </div>
    </div>

    <!-- Centered loader overlay (hidden by default) -->
    <div id="loaderOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="loader-spinner"></div>
            <p class="english-text">Initializing system...</p>
            <p class="urdu-text">سسٹم شروع ہو رہا ہے...</p>
        </div>
    </div>

    <!-- Footer injected by galaxy-core.js -->
</body>
</html>
