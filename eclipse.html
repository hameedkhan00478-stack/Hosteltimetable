<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PeshoX Intelligence | Eclipse</title>
    <!-- Global core -->
    <link rel="stylesheet" href="galaxy-core.css">
    <link rel="stylesheet" href="eclipse.css">
    <script src="galaxy-core.js" defer></script>
    <script src="eclipse.js" defer></script>
</head>
<body> 
    <div class="main-content eclipse-container">
        <div class="loading-wrapper">
            <!-- Circular progress ring (SVG) -->
            <div class="progress-ring-container">
                <svg class="progress-ring" width="180" height="180" viewBox="0 0 180 180">
                    <circle class="progress-ring-bg" cx="90" cy="90" r="80" stroke-width="6" fill="none" />
                    <circle class="progress-ring-fill" cx="90" cy="90" r="80" stroke-width="6" fill="none" stroke-dasharray="502.4" stroke-dashoffset="502.4" />
                </svg>
                <div class="ring-icon">
                    <i class="fas fa-satellite-dish"></i>
                </div>
            </div>

            <!-- Bilingual status messages -->
            <div class="status-container">
                <div id="statusMessageEng" class="status-eng">Establishing secure link...</div>
                <div id="statusMessageUrdu" class="status-urdu">محفوظ رابطہ قائم کیا جا رہا ہے...</div>
            </div>
        </div>
    </div>

    <!-- Optional audio element (ping sound on message change) -->
    <audio id="pingSound" preload="auto">
        <source src="assets/sounds/ping.mp3" type="audio/mpeg">
    </audio>

    <!-- Footer injected by galaxy-core.js -->
</body>
</html>
